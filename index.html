    // --- ミニゲームコンポーネント ---
    function MiniGame({ monsters, onFinish }) {
      const [timeLeft, setTimeLeft] = useState(10);
      const [coins, setCoins] = useState(0);
      
      const initialPositions = useMemo(() => {
        return monsters.map((m) => ({
          id: m.id,
          emoji: m.emoji,
          x: 50 + (Math.random() * 40 - 20),
          y: 50 + (Math.random() * 40 - 20)
        }));
      }, [monsters]);

      const [playerPositions, setPlayerPositions] = useState(initialPositions);
      const [coinPos, setCoinPos] = useState({x: Math.random() * 80 + 10, y: Math.random() * 80 + 10});
      
      const playersRef = useRef(initialPositions);
      const coinRef = useRef({x: coinPos.x, y: coinPos.y});
      const keysRef = useRef({ArrowUp: false, ArrowDown: false, ArrowLeft: false, ArrowRight: false});
      const requestRef = useRef();
      const isFinished = useRef(false);

      useEffect(() => {
        const timer = setInterval(() => {
          setTimeLeft(prev => {
            if (prev <= 1) {
              clearInterval(timer);
              return 0;
            }
            return prev - 1;
          });
        }, 1000);
        return () => clearInterval(timer);
      }, []);

      useEffect(() => {
        if (timeLeft === 0 && !isFinished.current) {
          isFinished.current = true;
          cancelAnimationFrame(requestRef.current);
          onFinish(coins);
        }
      }, [timeLeft, coins, onFinish]);

      useEffect(() => {
        const handleKeyDown = (e) => {
          if (keysRef.current.hasOwnProperty(e.key)) {
            keysRef.current[e.key] = true;
            e.preventDefault();
          }
        };
        const handleKeyUp = (e) => {
          if (keysRef.current.hasOwnProperty(e.key)) {
            keysRef.current[e.key] = false;
            e.preventDefault();
          }
        };
        window.addEventListener('keydown', handleKeyDown, {passive: false});
        window.addEventListener('keyup', handleKeyUp);
        return () => {
          window.removeEventListener('keydown', handleKeyDown);
          window.removeEventListener('keyup', handleKeyUp);
        };
      }, []);

      useEffect(() => {
        const updateGame = () => {
          if (timeLeft <= 0) return;

          const speed = 1.5;
          let dx = 0;
          let dy = 0;

          if (keysRef.current.ArrowUp) dy -= speed;
          if (keysRef.current.ArrowDown) dy += speed;
          if (keysRef.current.ArrowLeft) dx -= speed;
          if (keysRef.current.ArrowRight) dx += speed;

          const newPositions = playersRef.current.map(p => {
            let px = p.x + dx;
            let py = p.y + dy;
            px = Math.max(5, Math.min(95, px));
            py = Math.max(5, Math.min(95, py));
            return { ...p, x: px, y: py };
          });

          playersRef.current = newPositions;
          setPlayerPositions(newPositions);

          const cx = coinRef.current.x;
          const cy = coinRef.current.y;
          const hit = newPositions.some(p => Math.hypot(p.x - cx, p.y - cy) < 12);
          
          if (hit) { 
            setCoins(c => c + 1);
            coinRef.current = {
              x: Math.random() * 80 + 10,
              y: Math.random() * 80 + 10
            };
            setCoinPos({...coinRef.current});
          }

          requestRef.current = requestAnimationFrame(updateGame);
        };
        requestRef.current = requestAnimationFrame(updateGame);
        return () => cancelAnimationFrame(requestRef.current);
      }, [timeLeft]);

      const handlePointer = (dir, isDown) => {
        keysRef.current[dir] = isDown;
      };

      return (
        <div className="min-h-screen bg-green-50 p-4 md:p-8 flex flex-col items-center justify-center">
          <div className="max-w-lg w-full bg-white rounded-3xl shadow-xl p-4 md:p-8 border-4 border-green-200">

              <div className="text-2xl font-bold text-gray-700">⏳ {timeLeft}びょう</div>
              <div className="text-2xl font-bold text-yellow-500">🪙 {coins} コイン</div>
            </div>
            
            <div className="relative w-full h-80 bg-green-100 rounded-xl overflow-hidden border-2 border-green-300">
              {playerPositions.map((p, index) => (
                <div 
                  key={p.id + '-' + index}
                  className="absolute text-5xl transform -translate-x-1/2 -translate-y-1/2 drop-shadow-md z-10"

              <div 
                className="absolute text-4xl transform -translate-x-1/2 -translate-y-1/2 drop-shadow-md animate-bounce"
                style={{ left: `${coinPos.x}%`, top: `${coinPos.y}%` }}

                onPointerDown={() => handlePointer('ArrowUp', true)}
                onPointerUp={() => handlePointer('ArrowUp', false)}
                onPointerLeave={() => handlePointer('ArrowUp', false)}
              >⬆️</button>
              <div />
              <button 
                className="bg-gray-200 active:bg-gray-400 p-4 rounded-xl text-2xl shadow select-none flex items-center justify-center"

                onPointerUp={() => handlePointer('ArrowRight', false)}
                onPointerLeave={() => handlePointer('ArrowRight', false)}

            </div>
            
            <p className="text-center text-gray-500 mt-4 text-sm font-bold">じゅうじキーでも うごかせるよ</p>
          </div>
        </div>
      );

    // --- メインアプリ ---

      const translateToEn = async (jaText, isCountry = false) => {
        try {
          const res = await fetch(`https://translate.googleapis.com/translate_a/single?client=gtx&sl=ja&tl=en&dt=t&q=${encodeURIComponent(jaText)}`);
          const data = await res.json();
          let enText = data[0][0][0].replace(/[\.\,\!]/g, '');
          
          if (!isCountry) {
            enText = enText.toLowerCase();
            enText = enText.replace(/^i want to /, '').replace(/^to /, '').trim();
          } else {
            const lowerEn = enText.toLowerCase();
            if (lowerEn.includes("united states") || lowerEn.includes("u.s.a") || lowerEn.includes("usa") || lowerEn.includes("america")) {
                enText = "the U.S.A.";
            } else if (lowerEn.includes("united kingdom") || lowerEn.includes("u.k.") || lowerEn.includes("uk") || lowerEn.includes("england")) {
                enText = "the U.K.";
            } else if (lowerEn.includes("netherlands")) {
                enText = "the Netherlands";
            } else if (lowerEn.includes("philippines")) {
                enText = "the Philippines";
            }
          }
          return enText;
        } catch(e) {
          console.error("Translation error", e);
          return isCountry ? "Somewhere nice" : "do something fun"; 
        }
      };

      const handleActivitySelect = (activity) => {
        setMyActivity(activity);
        setInputActivityText(activity.ja);
      };

      const handleDecide = async () => {
        if (!inputCountryText.trim() || !inputActivityText.trim()) {
          alert("行きたい国と、したいことを入力してね！");
          return;
        }
        setIsTranslating(true);
        
        let finalCountry = { ...myCountry };
        const foundCountry = COUNTRIES.find(c => c.ja === inputCountryText.trim() || c.name.toLowerCase() === inputCountryText.trim().toLowerCase());
        
        if (foundCountry) {
          finalCountry = foundCountry;
        } else {
          const enCountryText = await translateToEn(inputCountryText.trim(), true);
          finalCountry = { 
            id: 'custom_country', 
            name: enCountryText, 
            ja: inputCountryText.trim(), 
            emoji: '✈️', 
            keywords: [enCountryText.toLowerCase().replace('the ', '')] 
          };
        }
        setMyCountry(finalCountry);

        if (inputActivityText.trim() !== myActivity.ja) {
          const enActText = await translateToEn(inputActivityText.trim(), false);
          let ingText = enActText;
          if(currentLevel >= 3) {
              const words = enActText.split(' ');
              const verb = words[0];
              let ingVerb = verb + 'ing';
              if(verb.endsWith('e') && !verb.endsWith('ee')) ingVerb = verb.slice(0, -1) + 'ing';
              else if(verb.match(/[aeiou][bcdfghjklmnpqrstvwxyz]$/i) && verb.length <= 4) ingVerb = verb + verb.slice(-1) + 'ing'; 
              
              words[0] = ingVerb;
              ingText = words.join(' ');
          }

          const newActivity = { 
            id: 'custom_act', 
            name: enActText, 
            nameIng: ingText,
            ja: inputActivityText.trim(), 
            emoji: '✨', 
            keywords: [enActText.split(' ')[0].toLowerCase()] 
          };
          setMyActivity(newActivity);
        } else {
            let enActText = myActivity.name;
            const words = enActText.split(' ');
            const verb = words[0];
            let ingVerb = verb + 'ing';
            if(verb.endsWith('e') && !verb.endsWith('ee')) ingVerb = verb.slice(0, -1) + 'ing'; 
            else if(verb === 'get') ingVerb = 'getting';
            else if(verb === 'sit') ingVerb = 'sitting';
            else if(verb === 'run') ingVerb = 'running';
            else if(verb === 'swim') ingVerb = 'swimming';
            else if(verb === 'shop') ingVerb = 'shopping';
            words[0] = ingVerb;
            
            setMyActivity({...myActivity, nameIng: words.join(' ')});

        setIsTranslating(false);
        setStep('MY_SPEAK_ANSWER');
        setFailCount(0);

      const [comAnswerIndex, setComAnswerIndex] = useState(0);
      const [worksheetData, setWorksheetData] = useState(null);

        if (savedLevel) setCurrentLevel(parseInt(savedLevel, 10));
        const savedHighest = localStorage.getItem('englishAppHighestLevel');
        if (savedHighest) setHighestLevel(parseInt(savedHighest, 10));
      }, []);

      const formatPeriod = (text) => text.replace(/\.+$/, '.');

      const saveData = (newCount, newCollections, newCoins, newItems, newDishes) => {
        localStorage.setItem('englishAppPlayCount_Travel', newCount.toString());
        localStorage.setItem('englishAppCollections', JSON.stringify(newCollections));
        localStorage.setItem('englishAppCoins', newCoins.toString());
        if(newItems) localStorage.setItem('englishAppItems', JSON.stringify(newItems));
        if(newDishes) localStorage.setItem('englishAppDishes', JSON.stringify(newDishes));
        
        setPlayCount(newCount);
        setCollections(newCollections);
        setTotalCoins(newCoins);
        if(newItems) setItems(newItems);
        if(newDishes) setCookedDishes(newDishes);
      };

      const updateLevel = (newLevel) => {
        setCurrentLevel(newLevel);
        localStorage.setItem('englishAppCurrentLevel', newLevel.toString());
        if (newLevel > highestLevel) {
          setHighestLevel(newLevel);
          localStorage.setItem('englishAppHighestLevel', newLevel.toString());
        }
      };

      const getComAskTexts = () => {
        let text = "", jpText = "";
        if (currentLevel === 1) {
          text = "Where do you want to go?";
          jpText = "あなたは どこに 行きたいですか？";
        } else if (currentLevel === 2) {
          text = "Which country would you like to visit?";
          jpText = "どの国を訪れたいですか？";
        } else if (currentLevel === 3) {
          text = "If you could travel anywhere, where would you go?";
          jpText = "もしどこへでも旅行できるなら、どこに行きますか？";
        } else if (currentLevel === 4) {
          text = "What is your dream travel destination and why?";
          jpText = "あなたの夢の旅行先はどこですか、またその理由は？";
        }
        return { text, jpText };
      };

      const getMyAnswerTexts = () => {
        let en = "", ja = "";
        if (currentLevel === 1) {
          en = formatPeriod(`I want to go to ${myCountry.name}. I want to ${myActivity.name}.`);
          ja = `私は${myCountry.ja}に行きたいです。私は${myActivity.ja}をしたいです。`;
        } else if (currentLevel === 2) {
          en = formatPeriod(`I would like to visit ${myCountry.name}. Because I want to ${myActivity.name}.`);
          ja = `私は${myCountry.ja}を訪れたいです。なぜなら${myActivity.ja}をしたいからです。`;
        } else if (currentLevel === 3) {
          en = formatPeriod(`If I could travel anywhere, I'd go to ${myCountry.name}. I'm looking forward to ${myActivity.nameIng || myActivity.name}.`);
          ja = `もしどこへでも行けるなら、${myCountry.ja}に行きたいです。${myActivity.ja}をするのが楽しみです。`;
        } else if (currentLevel === 4) {
          en = formatPeriod(`My dream destination is ${myCountry.name}. The main reason is that I've always wanted to ${myActivity.name}.`);
          ja = `私の夢の旅行先は${myCountry.ja}です。一番の理由は、ずっと${myActivity.ja}をしたかったからです。`;
        }
        return { en, ja };
      };

      const getMyQuestionTexts = () => {
        return getComAskTexts();
      };

      // 国とアクティビティをハイライト表示するコンポーネント
      const AnswerTextWithHighlight = ({ isEn, data }) => {
        const lvl = data ? data.level : currentLevel;
        const country = data ? data.country : myCountry;
        const act = data ? data.activity : myActivity;

        const highlightClass = "font-bold px-1 rounded mx-1 shadow-sm inline-block";
        const countryClass = `${highlightClass} text-blue-700 bg-blue-100 border border-blue-200`;
        const actClass = `${highlightClass} text-green-700 bg-green-100 border border-green-200`;

        if (lvl === 1) {
          return isEn ? (
            <span>I want to go to <span className={countryClass}>{country.name}</span>.<br/>I want to <span className={actClass}>{act.name}</span>.</span>
          ) : (
            <span>私は<span className={countryClass}>{country.ja}</span>に行きたいです。私は<span className={actClass}>{act.ja}</span>をしたいです。</span>
          );
        } else if (lvl === 2) {
          return isEn ? (
            <span>I would like to visit <span className={countryClass}>{country.name}</span>.<br/>Because I want to <span className={actClass}>{act.name}</span>.</span>
          ) : (
            <span>私は<span className={countryClass}>{country.ja}</span>を訪れたいです。なぜなら<span className={actClass}>{act.ja}</span>をしたいからです。</span>
          );
        } else if (lvl === 3) {
          return isEn ? (
            <span>If I could travel anywhere, I'd go to <span className={countryClass}>{country.name}</span>.<br/>I'm looking forward to <span className={actClass}>{act.nameIng || act.name}</span>.</span>
          ) : (
            <span>もしどこへでも行けるなら、<span className={countryClass}>{country.ja}</span>に行きたいです。<span className={actClass}>{act.ja}</span>をするのが楽しみです。</span>
          );
        } else if (lvl === 4) {
          return isEn ? (
            <span>My dream destination is <span className={countryClass}>{country.name}</span>.<br/>The main reason is that I've always wanted to <span className={actClass}>{act.name}</span>.</span>
          ) : (
            <span>私の夢の旅行先は<span className={countryClass}>{country.ja}</span>です。一番の理由は、ずっと<span className={actClass}>{act.ja}</span>をしたかったからです。</span>
          );
        }
        return null;
      };

      const saveWorksheet = () => {
        const myAns = getMyAnswerTexts();
        const data = {
          level: currentLevel,
          country: myCountry,
          activity: myActivity,
          targetCountryName: myCountry.name,
          targetActivityName: myActivity.name,
          answerSentence: myAns.en,
          answerJa: myAns.ja
        };
        localStorage.setItem('englishAppWorksheet_Travel', JSON.stringify(data));
        setWorksheetData(data);
      };

      const startApp = () => {
        setFailCount(0);
        setStep('COM_ASK');
      };

      const buyItem = (itemType, cost) => {
        if (totalCoins >= cost) {
          const newCoins = totalCoins - cost;
          const newItems = { ...items, [itemType]: items[itemType] + 1 };
          saveData(playCount, collections, newCoins, newItems, cookedDishes);
          
          setPurchaseEffect(itemType);
          setTimeout(() => setPurchaseEffect(null), 1500);
        } else {
          alert("コインがたりないよ！ミニゲームであつめてね。");
        }
      };

      const cookDish = () => {
        if (items.takenoko >= 1 && items.satsumaimo >= 1) {
          const newItems = { takenoko: items.takenoko - 1, satsumaimo: items.satsumaimo - 1 };
          setItems(newItems);
          saveData(playCount, collections, totalCoins, newItems, cookedDishes);

          setCookEffect('cooking');
          setTimeout(() => {
            const unownedDishes = DISHES.filter(d => !cookedDishes.includes(d));
            const newDish = unownedDishes.length > 0 ? unownedDishes[Math.floor(Math.random() * unownedDishes.length)] : DISHES[Math.floor(Math.random() * DISHES.length)];
            
            setCookEffect(newDish);
            
            if (!cookedDishes.includes(newDish)) {
              const newDishes = [...cookedDishes, newDish];
              setCookedDishes(newDishes);
              saveData(playCount, collections, totalCoins, newItems, newDishes);
            }
          }, 2000);
        }
      };

      const handleBack = () => {
        setFailCount(0);
        setFeedbackMsg("");
        setIsListening(false);
        
        switch(step) {
          case 'COM_ASK': setStep('HOME'); break;
          case 'MY_INPUT_ANSWER': setStep('COM_ASK'); break;
          case 'MY_SPEAK_ANSWER': setStep('MY_INPUT_ANSWER'); break;
          case 'WORKSHEET_ANSWER': setStep('MY_SPEAK_ANSWER'); break;
          case 'MY_SPEAK_QUESTION': setStep('WORKSHEET_ANSWER'); break;
          case 'COM_ANSWER': setStep('MY_SPEAK_QUESTION'); break;
          case 'WORKSHEET_CHECK': setStep('COM_ANSWER'); break;
          case 'WORKSHEET_STAMP': setStep('WORKSHEET_CHECK'); break;
          case 'QUIZ_INTRO': setStep('WORKSHEET_STAMP'); break;
          case 'LEVEL_UP_PROMPT': setStep('HOME'); break;
          default: break;
        }
      };

      const BackButton = () => (
        <button onClick={handleBack} className="absolute top-4 left-4 bg-white/90 backdrop-blur-sm text-gray-700 font-bold py-2 px-4 rounded-full shadow-md hover:bg-gray-100 flex items-center z-20 border-2 border-gray-200">
          <span className="mr-1">◀</span> もどる
        </button>
      );

      const speak = useCallback((text, rate = 0.9) => {
        if (synth.speaking) synth.cancel();
        const utterThis = new SpeechSynthesisUtterance(text);
        utterThis.lang = 'en-US';
        utterThis.rate = rate; 
        const voices = synth.getVoices();
        const englishVoice = voices.find(v => v.lang.includes('en-US') && v.name.includes('Female')) || voices.find(v => v.lang.includes('en-US'));
        if (englishVoice) utterThis.voice = englishVoice;
        synth.speak(utterThis);
      }, [synth]);

      useEffect(() => {
        if (step === 'COM_ASK') {
          const { text } = getComAskTexts();
          setTimeout(() => speak(text), 500);
        } else if (step === 'COM_ANSWER') {
          let ansKey = currentLevel === 1 ? 'l1' : currentLevel === 2 ? 'l2' : currentLevel === 3 ? 'l3' : 'l4';
          const comAnsSentence = COM_ANSWERS[ansKey].en;
          setTimeout(() => speak(comAnsSentence), 500);
        }
      }, [step, speak, currentLevel]);

      const prepareQuiz = () => {
        const q = [];
        while(q.length < 4) {
          const r = Math.floor(Math.random() * COUNTRIES.length);
          if(!q.includes(r)) q.push(r);
        }
        setQuizQuestions(q);
        setCurrentQuizIndex(0);
        setStep('QUIZ_INTRO');
      };

      const startListening = (targetType) => {
        if (!SpeechRecognition) {
          alert("お使いのブラウザは音声入力に対応していません。スキップして進んでください。");
          setFailCount(2); 
          return;
        }
        const recognition = new SpeechRecognition();
        recognition.lang = 'en-US';
        recognition.interimResults = false;
        recognition.maxAlternatives = 1;

        setIsListening(true);
        setFeedbackMsg("");

        recognition.onresult = (event) => {
          const transcript = event.results[0][0].transcript.toLowerCase();
          checkPronunciation(transcript, targetType);
        };
        recognition.onerror = () => {
          setIsListening(false);
          handleFail();
        };
        recognition.onend = () => setIsListening(false);
        recognition.start();
      };

      const handleFail = () => {
        setFailCount(prev => prev + 1);
        setFeedbackMsg("おしい！もういちどチャレンジ！\nマイクの場所はどこか確認をしよう。\n分からない人は先生を呼ぼう。\n自分の声がうまく入らない場合はイヤホンをとってやってみよう。");
      };

      const checkPronunciation = (transcript, targetType) => {
        let isCorrect = false;
        const trans = transcript.toLowerCase();
        
        if (targetType === 'MY_ANSWER') {
          const hasCountry = myCountry.keywords.some(k => trans.includes(k));
          const hasActivity = myActivity.keywords.some(k => trans.includes(k.replace('_', ' ')));
          isCorrect = hasCountry && hasActivity;
          if (!isCorrect && trans.length > 5 && (hasCountry || hasActivity)) isCorrect = true; // 救済処置
        } 
        else if (targetType === 'MY_QUESTION') {
          if (currentLevel === 1) {
            isCorrect = trans.includes('where') || trans.includes('want') || trans.includes('go');
            if(trans.length > 8) isCorrect = true;
          } else if (currentLevel === 2) {
            isCorrect = trans.includes('which') || trans.includes('country') || trans.includes('visit');
            if(trans.length > 10) isCorrect = true;
          } else if (currentLevel === 3) {
            isCorrect = trans.includes('travel') || trans.includes('anywhere') || trans.includes('where');
            if(trans.length > 10) isCorrect = true;
          } else if (currentLevel === 4) {
            isCorrect = trans.includes('dream') || trans.includes('destination') || trans.includes('why');
            if(trans.length > 10) isCorrect = true;
          }
        }
        else if (targetType === 'QUIZ') {
          if (quizQuestions.length > 0 && currentQuizIndex < quizQuestions.length) {
            const qCountry = COUNTRIES[quizQuestions[currentQuizIndex]];
            isCorrect = qCountry.keywords.some(kw => trans.includes(kw));
          }
        }

        if (isCorrect) {
          setFeedbackMsg("Excellent! 👏");
          setTimeout(() => speak("Excellent!"), 500);
          setTimeout(() => proceedToNext(targetType), 2000);
        } else {
          handleFail();
        }
      };

      const proceedToNext = (fromType) => {
        setFailCount(0);
        setFeedbackMsg("");
        
        if (fromType === 'MY_ANSWER') {
          if (currentLevel === 1) {
            setStep('WORKSHEET_ANSWER');
          } else {
            setStep('MY_SPEAK_QUESTION'); // 中学レベル以上はワークシートスキップ
          }
        }
        if (fromType === 'MY_QUESTION') {
          setStep('COM_ANSWER'); 
        }
        if (fromType === 'QUIZ') {
          if (currentQuizIndex + 1 < 4) {
            setCurrentQuizIndex(prev => prev + 1);
          } else {
            setStep('GACHA');
          }
        }
      };

      const rollGacha = () => {
        setIsRolling(true);
        const intervalId = setInterval(() => {
          setRollEmoji(MONSTERS[Math.floor(Math.random() * MONSTERS.length)].emoji);
        }, 100);

        const ownedIds = collections.map(c => c.id);
        const unowned = MONSTERS.filter(m => !ownedIds.includes(m.id));
        const newMonster = unowned.length > 0 ? unowned[Math.floor(Math.random() * unowned.length)] : MONSTERS[Math.floor(Math.random() * MONSTERS.length)];

        setTimeout(() => {
          clearInterval(intervalId);
          setIsRolling(false);
          setCurrentGachaMonster(newMonster);
          if (!ownedIds.includes(newMonster.id)) {
            saveData(playCount + 1, [...collections, newMonster], totalCoins, items, cookedDishes);
          } else {
            saveData(playCount + 1, collections, totalCoins, items, cookedDishes);
          }
        }, 2500);
      };

      const renderHeader = (title) => (
        <div className="bg-blue-500 text-white p-4 rounded-t-2xl flex items-center justify-center font-bold text-xl mb-4 shadow-md">
          {title}
        </div>
      );

      const CharacterMessage = ({ text, jpText, emoji = "🧑", isCom = false, name }) => (
        <div className="flex flex-col items-center mb-8">
          <div className={`text-7xl mb-2 ${isCom ? 'bg-green-100' : 'bg-gray-100'} rounded-full w-24 h-24 flex items-center justify-center shadow-inner border-4 border-white`}>{emoji}</div>
          {name && <div className="font-bold text-gray-600 mb-2">{name}</div>}
          <div className={`bg-white border-4 ${isCom ? 'border-green-200' : 'border-blue-200'} p-6 rounded-3xl rounded-tl-none shadow-md relative max-w-sm w-full text-left`}>
            <button onClick={() => speak(text)} className="absolute -top-5 -right-5 bg-blue-100 p-3 rounded-full text-blue-600 hover:bg-blue-200 shadow-sm text-2xl">🔊</button>
            <p className="text-2xl font-bold text-gray-800 leading-snug">{text}</p>
            {jpText && <p className="text-gray-500 mt-3 text-sm font-bold">（{jpText}）</p>}
          </div>
        </div>
      );

      // UI レンダリングブロック
      let content = null;

      if (step === 'HOME') {
        content = (
          <div className="min-h-screen p-4 md:p-8 flex flex-col justify-center relative bg-blue-50 pb-20">
            {cookEffect && (
              <div className="fixed inset-0 bg-black/70 flex items-center justify-center z-50 p-4">
                <div className="bg-white rounded-3xl p-8 max-w-sm w-full text-center shadow-2xl">
                  {cookEffect === 'cooking' ? (
                    <div className="animate-pulse">
                      <div className="text-8xl mb-4">🍲</div>
                      <p className="text-2xl font-bold text-orange-600">おなべで<br/>おりょうり中...</p>
                    </div>
                  ) : (
                    <div className="animate-fade-in-up">
                      <div className="text-8xl mb-4">✨🍽️✨</div>
                      <p className="text-gray-500 font-bold mb-2 text-lg">かんせい！</p>
                      <p className="text-2xl font-bold text-orange-700 mb-8 border-b-2 border-orange-200 pb-4">{cookEffect}</p>
                      <button onClick={() => setCookEffect(null)} className="bg-orange-500 hover:bg-orange-600 text-white font-bold py-3 px-8 rounded-full text-xl shadow-lg transform transition hover:scale-105">おいしそう！</button>
                    </div>
                  )}
                </div>
              </div>
            )}

            {purchaseEffect && (
              <div className="fixed inset-0 pointer-events-none flex items-center justify-center z-50">
                <div className="animate-bounce-in text-9xl drop-shadow-2xl">
                  {purchaseEffect === 'takenoko' ? '🎋' : '🍠'}
                </div>
              </div>
            )}

            <div className="absolute top-4 left-4 bg-yellow-400 text-yellow-900 font-bold px-4 py-2 rounded-full text-sm md:text-base shadow-lg border-2 border-yellow-200 z-10 flex items-center gap-2">
              <span className="text-xl">🌟</span>
              <select 
                value={currentLevel} 
                onChange={(e) => updateLevel(parseInt(e.target.value, 10))}
                className="bg-transparent font-bold outline-none cursor-pointer appearance-none pr-4"
              >
                {Array.from({length: highestLevel}, (_, i) => i + 1).map(l => (
                  <option key={l} value={l} className="text-gray-800">
                    レベル {l}: {l === 1 ? '小学生' : l === 2 ? '中学' : l === 3 ? '高校' : '大学'}
                  </option>
                ))}
              </select>
              <span className="text-xs">▼</span>
            </div>

            <div className="absolute top-4 right-4 bg-yellow-400 text-yellow-900 font-bold px-6 py-2 rounded-full border-4 border-yellow-200 shadow-lg text-xl z-10 flex gap-4">
              <span>🪙 {totalCoins}</span>
              <span>🎋 {items.takenoko || 0}</span>
              <span>🍠 {items.satsumaimo || 0}</span>
            </div>
            
            <div className="max-w-2xl w-full mx-auto bg-white rounded-3xl shadow-xl overflow-hidden border-4 border-blue-200 mt-16 md:mt-12">
              <div className="bg-gradient-to-r from-blue-400 to-indigo-500 p-8 text-center text-white relative">
                <h1 className="text-3xl md:text-4xl font-extrabold mb-4 drop-shadow-md mt-4">えいごで はなそう！</h1>
                <p className="text-lg bg-white/20 inline-block px-4 py-2 rounded-full font-medium mb-2">🎧 イヤホンを つけましょう 🎧</p>
                <p className="text-sm font-bold opacity-90">じぶんの 声が うまく 入らない ときは、<br/>イヤホンを とって やってみよう！</p>
              </div>
              
              <div className="p-8 text-center">
                {playCount > 0 && (
                  <div className="mb-6 bg-orange-100 p-4 rounded-xl border-2 border-orange-200 animate-pulse">
                    <p className="text-orange-700 font-bold">ゲームで コインを あつめて、たくさん<br/>タケノコや さつまいもを ゲットしよう！</p>
                  </div>
                )}

                {playCount > 0 && (
                  <p className="text-pink-600 font-bold mb-4 text-lg animate-pulse">さっきと ちがう国を えらんでみよう！</p>
                )}

                <button 
                  onClick={startApp}
                  className="bg-red-500 hover:bg-red-600 text-white text-2xl font-bold py-4 px-12 rounded-full shadow-lg transform transition hover:scale-105 active:scale-95 mx-auto mb-8 flex items-center"
                >
                  <span className="mr-2 text-2xl">▶️</span> スタート！
                </button>

                {playCount > 0 && (
                  <>
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
                      <div className="bg-green-50 p-4 rounded-2xl border-2 border-green-200 relative overflow-hidden">
                        <h3 className="font-bold text-green-700 mb-2">🎋 タケノコをかう (10🪙)</h3>
                        <button onClick={() => buyItem('takenoko', 10)} className="bg-green-500 text-white px-4 py-2 rounded-full font-bold shadow hover:bg-green-600 active:scale-95 relative z-10">かう！</button>
                      </div>
                      <div className="bg-purple-50 p-4 rounded-2xl border-2 border-purple-200 relative overflow-hidden">
                        <h3 className="font-bold text-purple-700 mb-2">🍠 さつまいもをかう (10🪙)</h3>
                        <button onClick={() => buyItem('satsumaimo', 10)} className="bg-purple-500 text-white px-4 py-2 rounded-full font-bold shadow hover:bg-purple-600 active:scale-95 relative z-10">かう！</button>
                      </div>
                    </div>

                    <div className="bg-orange-50 p-4 rounded-2xl border-2 border-orange-200 mb-8">
                      <h3 className="font-bold text-orange-800 mb-2 text-lg">👨‍🍳 おみせで お料理をつくる</h3>
                      <p className="text-sm text-orange-700 font-bold mb-3">タケノコと サツマイモが １こずつ ひつようだよ！</p>
                      <button 
                        onClick={cookDish} 
                        disabled={items.takenoko < 1 || items.satsumaimo < 1}
                        className={`text-white px-6 py-3 rounded-full font-bold shadow text-lg flex items-center justify-center mx-auto transition ${items.takenoko >= 1 && items.satsumaimo >= 1 ? 'bg-orange-500 hover:bg-orange-600 transform hover:scale-105' : 'bg-gray-400 opacity-70 cursor-not-allowed'}`}
                      >
                        <span className="mr-2">🍳</span>おりょうりする！
                      </button>
                      
                      {cookedDishes.length > 0 && (
                        <div className="mt-6 text-left border-t-2 border-orange-200 pt-4">
                          <p className="font-bold text-orange-800 mb-2">✨ つくった お料理 ({cookedDishes.length}/10)</p>
                          <ul className="list-disc pl-5 text-sm text-gray-700 font-bold space-y-1">
                            {cookedDishes.map((dish, i) => <li key={i}>{dish}</li>)}
                          </ul>
                        </div>
                      )}
                    </div>

                    <div className="bg-yellow-50 rounded-2xl p-6 border-2 border-yellow-200">
                      <h2 className="text-xl font-bold text-yellow-700 mb-4">⭐ あつめたモンスター ({collections.length}/30)</h2>
                      <div className="grid grid-cols-5 gap-2 md:gap-4">
                        {collections.map(m => (
                          <div key={m.id} className={`${m.color} p-2 rounded-xl text-center shadow-sm text-2xl relative group cursor-default`} title={m.name}>
                            {m.emoji}
                            <div className="absolute hidden group-hover:block bg-black text-white text-xs p-1 rounded -top-8 left-1/2 transform -translate-x-1/2 whitespace-nowrap z-10">{m.name}</div>
                          </div>
                        ))}
                        {Array.from({ length: 30 - collections.length }).map((_, i) => (
                          <div key={`empty-${i}`} className="bg-gray-100 p-2 rounded-xl text-center border-2 border-dashed border-gray-300 text-2xl opacity-50">❓</div>
                        ))}
                      </div>
                    </div>
                  </>
                )}
              </div>
            </div>
          </div>
        );
      } else if (step === 'COM_ASK') {
        const { text, jpText } = getComAskTexts();
        content = (
          <div className="min-h-screen bg-green-50 p-4 flex items-center justify-center relative">
            <BackButton />
            <div className="max-w-lg w-full bg-white rounded-3xl shadow-xl p-8 border-4 border-green-200 text-center mt-12">
              {renderHeader("クッマーニからの しつもん")}
              <CharacterMessage 
                text={text} 
                jpText={jpText} 
                isCom={true}
                emoji="🐻"

              <p className="text-lg font-bold text-gray-500 mb-4">ぜんぶで {totalCoins} コインになったよ！</p>
              
              <div className="bg-orange-100 p-4 rounded-xl border-2 border-orange-200 mb-8">
                <p className="text-orange-700 font-bold text-lg">ホームがめんで コインをつかって<br/>タケノコや さつまいもを かってみよう！</p>
              </div>
              
              <button onClick={() => { setCurrentGachaMonster(null); setStep('LEVEL_UP_PROMPT'); }} className="bg-blue-500 hover:bg-blue-600 text-white text-xl font-bold py-4 px-8 rounded-full flex items-center justify-center mx-auto shadow-md transform transition hover:scale-105 w-full">
                <span className="mr-2">➡️</span> つぎへ
              </button>
            </div>
          </div>
        );
      } else if (step === 'LEVEL_UP_PROMPT') {
        let nextLevelName = "";
        if (currentLevel === 1) nextLevelName = "中学レベル";
        else if (currentLevel === 2) nextLevelName = "高校レベル";
        else if (currentLevel === 3) nextLevelName = "大学レベル";

        content = (
          <div className="min-h-screen bg-blue-50 p-4 flex items-center justify-center relative">
            <div className="max-w-lg w-full bg-white rounded-3xl shadow-xl p-8 text-center border-4 border-blue-200">
              <h2 className="text-3xl font-bold text-blue-600 mb-6">レベル {currentLevel} クリア！🎉</h2>
              {currentLevel < 4 ? (
                <>
                  <p className="text-xl font-bold text-gray-700 mb-8 leading-relaxed">
                    おなじレベル（{currentLevel === 1 ? '小学生' : currentLevel === 2 ? '中学' : '高校'}レベル）を つづける？<br/>
                    それとも、ハイレベル（{nextLevelName}）に いどうする？
                  </p>
                  <div className="flex flex-col gap-4">
                    <button onClick={() => { updateLevel(currentLevel + 1); setStep('HOME'); }} className="bg-red-500 hover:bg-red-600 text-white font-bold py-4 px-8 rounded-full text-xl shadow-md transition transform hover:scale-105">🚀 {nextLevelName}に いどうする！</button>
                    <button onClick={() => { setStep('HOME'); }} className="bg-blue-500 hover:bg-blue-600 text-white font-bold py-4 px-8 rounded-full text-xl shadow-md transition hover:scale-105">♻️ おなじレベルを つづける</button>
                  </div>
                </>
              ) : (
                <>
                  <p className="text-xl font-bold text-gray-700 mb-8 leading-relaxed">さいこうレベル（大学レベル）を<br/>クリアしたよ！すごい！✨</p>
                  <button onClick={() => { setStep('HOME'); }} className="bg-blue-500 hover:bg-blue-600 text-white font-bold py-4 px-8 rounded-full text-xl shadow-md transition transform hover:scale-105">🏠 ホームに もどる</button>
                </>
              )}
            </div>
          </div>
        );
      }

      return (
        <div className="min-h-screen relative font-sans touch-manipulation">
          {content}

          {worksheetData && !['WORKSHEET_ANSWER', 'WORKSHEET_STAMP', 'WORKSHEET_CHECK', 'HOME', 'MINIGAME', 'MINIGAME_INTRO', 'RESULT', 'GACHA', 'LEVEL_UP_PROMPT'].includes(step) && (
            <button 
              onClick={() => setShowWorksheet(true)} 
              className="fixed bottom-6 right-6 bg-yellow-400 hover:bg-yellow-500 text-yellow-900 p-4 rounded-full shadow-2xl z-40 text-3xl border-4 border-white transition transform hover:scale-110"
            >
              📑<span className="text-xs font-bold block -mt-1 text-center">ワークシート</span>
            </button>
          )}

          {showWorksheet && worksheetData && (
            <div className="fixed inset-0 bg-black/60 flex items-center justify-center z-50 p-2 md:p-4 backdrop-blur-sm animate-fade-in-up">
              <div className="bg-white rounded-3xl p-6 md:p-8 max-w-2xl w-full relative border-4 border-yellow-300 shadow-2xl bg-[url('https://www.transparenttextures.com/patterns/lined-paper-2.png')] max-h-[95vh] overflow-y-auto">
                <button 
                  onClick={() => setShowWorksheet(false)} 
                  className="absolute top-4 right-4 text-gray-500 hover:text-gray-800 text-3xl font-bold bg-gray-100 w-12 h-12 rounded-full flex items-center justify-center shadow z-10 border-2 border-gray-300"
                >
                  ✖
                </button>
                <h3 className="text-2xl font-bold text-yellow-700 mb-6 flex items-center border-b-2 border-yellow-200 pb-2"><span className="mr-2 text-3xl">📑</span> ワークシート</h3>
                
                <div className="grid grid-cols-1 gap-8">
                  <div className="bg-white/90 p-6 rounded-2xl border-4 border-blue-200 shadow-md">
                    <h4 className="font-bold text-blue-700 text-xl mb-4 bg-blue-100 px-4 py-2 rounded-lg inline-block shadow-sm">【わたしの こたえ】</h4>
                    <div className="space-y-6 mb-2">
                      <div>
                        <div className="text-2xl md:text-3xl font-worksheet font-bold text-blue-800 border-b-2 border-dashed border-blue-200 pb-4 mb-2 leading-loose"><AnswerTextWithHighlight isEn={true} data={worksheetData} /></div>
                        <p className="text-base text-gray-600 mt-4 font-bold bg-gray-50 inline-block px-3 py-2 rounded-xl border border-gray-200 leading-relaxed font-worksheet"><AnswerTextWithHighlight isEn={false} data={worksheetData} /></p>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
